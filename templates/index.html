<!DOCTYPE html>
<html>
<head><title>ToDo List</title></head>
<body>
    <h1>ToDo一覧</h1>
    <a href="/create">新規作成</a>

    <ul>
        {% for todo in todos %}
        <li>
            {{ todo.title }} - {{ todo.due_date }}
            <a href="/detail/{{ todo.id }}">詳細</a>
            <a href="/edit/{{ todo.id }}">編集</a>
            <a href="/delete/{{ todo.id }}">削除</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
